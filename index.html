<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>המסדר יעבור לדום</title>

<style>

body{
margin:0;
background:#c62828;
color:white;
text-align:center;
font-family:Arial,sans-serif;
padding:15px;
}

h1{
font-size:34px;
margin-top:20px;
}

.instructions{
font-size:18px;
margin-bottom:20px;
}

button{
font-size:22px;
padding:12px 24px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

#timer{
font-size:32px;
font-weight:bold;
margin:20px 0;
}

#numbers{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
max-width:500px;
margin:20px auto;
min-height:250px;
}

.number{
background:white;
color:black;
border-radius:12px;
padding:12px;
font-size:32px;
font-weight:bold;
}

#answerBtn{
display:none;
}

.logo{
font-size:28px;
color:#ffd600;
font-weight:bold;
margin-top:30px;
}

</style>

</head>

<body>

<h1>🔥 המסדר יעבור לדום! 🔥</h1>

<div class="instructions">
זכרו את 7 המספרים וסדרו אותם מהקטן לגדול
</div>

<button onclick="startGame()">
🚀 התחל משימה
</button>

<div id="timer"></div>

<div id="numbers"></div>

<button id="answerBtn" onclick="showAnswer()">
🔍 הצג תשובה
</button>

<div class="logo">
FUNMIGO
</div>

<script>

let currentNumbers=[];

function startGame(){

document.getElementById("answerBtn").style.display="none";

currentNumbers=[];

while(currentNumbers.length<7){

let num=Math.floor(Math.random()*89)+11;

if(!currentNumbers.includes(num)){
currentNumbers.push(num);
}

}

let html="";

currentNumbers.forEach(num=>{
html+=`<div class="number">${num}</div>`;
});

let numbersDiv=document.getElementById("numbers");
let timer=document.getElementById("timer");

let round=0;

function cycle(){

if(round>=5){

numbersDiv.innerHTML="";

timer.innerHTML="🎯 הזמן הסתיים";

document.getElementById("answerBtn").style.display="inline-block";

return;

}

numbersDiv.innerHTML=html;

timer.innerHTML="👀 הסתכלו!";

setTimeout(()=>{

numbersDiv.innerHTML="";

timer.innerHTML="🙈 הסתירו!";

round++;

setTimeout(cycle,2000);

},2000);

}

cycle();

}
    function showAnswer(){

let sorted=[...currentNumbers].sort((a,b)=>a-b);

document.getElementById("timer").innerHTML="✅ התשובה הנכונה";

document.getElementById("numbers").innerHTML=

sorted.map(num=>`<div class="number">${num}</div>`).join("");

document.getElementById("answerBtn").style.display="none";

}

</script>

</body>
</html>
