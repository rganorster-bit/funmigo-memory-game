<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>המסדר יעבור לדום</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#c62828;
    color:white;
    text-align:center;
}

h1{
    font-size:55px;
    margin-top:30px;
}

button{
    font-size:30px;
    padding:15px 35px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:20px;
}

#timer{
    font-size:45px;
    font-weight:bold;
    margin:20px;
}

#numbers{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    max-width:800px;
    margin:30px auto;
    padding:20px;
}

.number{
    background:white;
    color:black;
    font-size:60px;
    font-weight:bold;
    border-radius:20px;
    padding:25px;
}

.logo{
    margin-top:40px;
    font-size:40px;
    font-weight:bold;
    color:#ffd600;
}

.instructions{
    font-size:22px;
    margin-top:15px;
}

</style>
</head>

<body>

<h1>🔥 המסדר יעבור לדום! 🔥</h1>

<div class="instructions">
זכרו את 7 המספרים וסדרו אותם מהקטן לגדול
</div>

<button onclick="startGame()">
🚀 התחל משימה
</button>

<div id="timer"></div>

<div id="numbers"></div>

<div class="logo">
FUNMIGO
</div>

<script>

function startGame(){

let numbers=[];

while(numbers.length<7){

let num=Math.floor(Math.random()*89)+11;

if(!numbers.includes(num)){
numbers.push(num);
}
}

let html="";

numbers.forEach(num=>{
html+=`<div class="number">${num}</div>`;
});

document.getElementById("numbers").innerHTML=html;

let timeLeft=10;

document.getElementById("timer").innerHTML=
"⏳ "+timeLeft;

let countdown=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerHTML=
"⏳ "+timeLeft;

if(timeLeft<=0){

clearInterval(countdown);

document.getElementById("numbers").innerHTML="";

document.getElementById("timer").innerHTML=
"🎯 הזמן הסתיים!<br><br>סדרו את המספרים מהקטן לגדול";

}

},1000);

}

</script>

</body>
</html>
