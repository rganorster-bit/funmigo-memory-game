<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUNmigo - אתגר הזיכרון</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ff4d4d;
    margin:0;
    text-align:center;
    color:white;
}

h1{
    margin-top:20px;
    font-size:40px;
}

#grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    color:#222;
    border-radius:20px;
    font-size:48px;
    font-weight:bold;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#message{
    font-size:42px;
    margin-top:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🧠 אתגר הזיכרון</h1>

<div id="grid"></div>

<div id="message"></div>

<script>

const grid = document.getElementById("grid");

for(let i=0;i<7;i++){

    const num = Math.floor(Math.random()*89)+11;

    const card = document.createElement("div");
    card.className="card";
    card.textContent=num;

    grid.appendChild(card);
}

setTimeout(()=>{

    grid.innerHTML="";
    document.getElementById("message").innerHTML=
    "⏰ הזמן נגמר!<br><br>סדרו את המספרים מהנמוך לגבוה";

},10000);

</script>

</body>
</html>
